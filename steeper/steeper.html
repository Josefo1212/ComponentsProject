<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Stepper Component</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="page">
		<ui-stepper active-step="0">
			<section class="step-panel" data-title="Cuenta" data-subtitle="Crea el acceso">
				<h2>Cuenta</h2>
				<p>Configura tu correo y la contraseña principal para iniciar.</p>
				<label>
					Correo
					<input type="email" placeholder="usuario@correo.com">
				</label>
			</section>

			<section class="step-panel" data-title="Perfil" data-subtitle="Completa tus datos">
				<h2>Perfil</h2>
				<p>Agrega tu nombre y una breve descripción para identificarte.</p>
				<label>
					Nombre
					<input type="text" placeholder="Tu nombre">
				</label>
			</section>

			<section class="step-panel" data-title="Confirmar" data-subtitle="Revisa antes de enviar">
				<h2>Confirmar</h2>
				<p>Revisa la información y termina el proceso cuando esté todo listo.</p>
				<button type="button">Finalizar</button>
			</section>
		</ui-stepper>
	</main>

	<script src="Stepper.js"></script>
</body>
</html>
