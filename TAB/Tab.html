<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Component</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="page">
        <section class="tabs" aria-label="Example tabs">
            <div class="tab-buttons" role="tablist">
                <button class="tab-button is-active" role="tab" aria-selected="true" aria-controls="panel-one" id="tab-one">Tab 1</button>
                <button class="tab-button" role="tab" aria-selected="false" aria-controls="panel-two" id="tab-two" tabindex="-1">Tab 2</button>
            </div>
            <div class="tab-panels">
                <article class="tab-panel is-active" role="tabpanel" id="panel-one" aria-labelledby="tab-one">
                    <p>Contenido base del primer tab.</p>
                </article>
                <article class="tab-panel" role="tabpanel" id="panel-two" aria-labelledby="tab-two" hidden>
                    <p>Contenido base del segundo tab.</p>
                </article>
            </div>
        </section>
    </main>

    <script src="Tab.js"></script>
</body>
</html>
