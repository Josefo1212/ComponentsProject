<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Popup Menu Component</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="page">
		<section class="demo-card" aria-label="Ejemplo de popup menu">
			<popup-menu label="Acciones" placement="top">
				<button type="button">Editar</button>
				<button type="button">Duplicar</button>
				<a href="#">Mover</a>
				<button type="button">Eliminar</button>
			</popup-menu>
		</section>
	</main>

	<script src="PopupMenu.js"></script>
</body>
</html>
